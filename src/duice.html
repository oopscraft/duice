<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>duice</title>
<script src="duice.js"></script>
<link rel="stylesheet" type="text/css" href="duice.css">
<script>
var users = new duice.data.List([
	{id:"dog", name:"Dog", groupId:'animal', isAlive:'Y'},
	{id:"apple", name:"Apple", groupId:'fruit', isAlive:'N'},
	{id:"cat", name:"Cat", groupId:'animal', isAlive:'Y'},
	{id:"orange", name:"Orange", groupId:'fruit', isAlive:'N'}
]);
var user = new duice.data.Map({
	id:'dog',
	name:'Dog',
	groupId:'animal',
	isAlive:'Y'
});
var groups = new duice.data.List([
	{id:"animal", name:"Animal"},
	{id:"fruit", name:"Fruit"}
]);

</script>
</head>
<body>
<button type="button" onclick="alert(JSON.stringify(users.toJson()));">users</button>
<button type="button" onclick="alert(JSON.stringify(groups.toJson()));">groups</button>
<div>
	<table data-duice="Grid" data-duice-bind="users" data-duice-item="user">
		<thead>
			<tr>
				<th>ID</th>
				<th>Name</th>
				<th>Group</th>
				<th>Alive</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td><input type="text" data-duice="TextField" data-duice-bind="user,id"/></td>
				<td><input type="text" data-duice="TextField" data-duice-bind="user,name"/></td>
				<td><select data-duice="ComboBox" data-duice-bind="user,groupId" data-duice-option="groups,id,name"></select></td>
				<td><input type="checkbox" data-duice="CheckBox" data-duice-bind="user,isAlive" data-duice-option="Y,N"/></td>
			</tr>
		</tbody>
	</table>
</div>
<div>
	<span data-duice="Text" data-duice-bind="user,name"></span>
	<input type="text" data-duice="TextField" data-duice-bind="user,name"/>
	<select data-duice="ComboBox" data-duice-bind="user,groupId" data-duice-option="groups,id,name"></select>
</div>
<div>
	<input type="checkbox" data-duice="CheckBox" data-duice-bind="user,isAlive" data-duice-option="Y,N"/>
</div>
</body>
</html>
