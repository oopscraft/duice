<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>duice</title>
<script src="duice.js"></script>
<link rel="stylesheet" type="text/css" href="duice.css">
<script>
var users = new duice.data.List([
	{id:"dog", name:"Dog", groupId:'animal', isAlive:'Y'},
	{id:"apple", name:"Apple", groupId:'fruit', isAlive:'N'},
	{id:"cat", name:"Cat", groupId:'animal', isAlive:'Y'},
	{id:"orange", name:"Orange", groupId:'fruit', isAlive:'N'},
	{id:"dog1", name:"Dog1", groupId:'animal', isAlive:'Y'},
	{id:"apple1", name:"Apple1", groupId:'fruit', isAlive:'N'},
	{id:"cat1", name:"Cat1", groupId:'animal', isAlive:'Y'},
	{id:"orange1", name:"Orange1", groupId:'fruit', isAlive:'N'},
	{id:"dog2", name:"Dog2", groupId:'animal', isAlive:'Y'},
	{id:"apple2", name:"Apple2", groupId:'fruit', isAlive:'N'},
	{id:"cat2", name:"Cat2", groupId:'animal', isAlive:'Y'},
	{id:"orange2", name:"Orange2", groupId:'fruit', isAlive:'N'}
]);
var user = new duice.data.Map({});
var groups = new duice.data.List([
	{id:"animal", name:"Animal"},
	{id:"fruit", name:"Fruit"}
]);
function getUser(id){
	var item = users.findRow(function(item){
		if(item.get('id') === id){
			return true;
		}
	});
	console.log(id, item);
	user.fromJson(item.toJson());
}
</script>
</head>
<body>
<button type="button" onclick="alert(JSON.stringify(users.toJson()));">users</button>
<button type="button" onclick="alert(JSON.stringify(groups.toJson()));">groups</button>
<div>
	<table data-duice="Grid" data-duice-bind="users" data-duice-item="user" data-duice-editable="true">
		<thead>
			<tr>
				<th>No</th>
				<th>ID</th>
				<th>Name</th>
				<th>Group</th>
				<th>Alive</th>
			</tr>
		</thead>
		<tbody data-id="[[$context.user.get('id')]]" onclick="getUser(this.dataset.id);">
			<tr>
				<td>[[$context.index+1]]</td>
				<td><span data-duice="Text" data-duice-bind="user,name"></span></td>
				<td><input type="text" data-duice="TextField" data-duice-bind="user,name"/></td>
				<td><select data-duice="ComboBox" data-duice-bind="user,groupId" data-duice-option="groups,id,name"></select></td>
				<td><input type="checkbox" data-duice="CheckBox" data-duice-bind="user,isAlive" data-duice-option="Y,N"/></td>
			</tr>
		</tbody>
	</table>
</div>
<div style="border:solid 2px #efefef;">
	<table>
		<tr>
			<th>ID</th>
			<td><span data-duice="Text" data-duice-bind="user,name"></span></td>
		</tr>
		<tr>
			<th>Name</th>
			<td><input type="text" data-duice="TextField" data-duice-bind="user,name"/></td>
		</tr>
		<tr>
			<th>Group</th>
			<td><select data-duice="ComboBox" data-duice-bind="user,groupId" data-duice-option="groups,id,name"></select></td>
		</tr>
		<tr>
			<th>isAlive</th>
			<td><input type="checkbox" data-duice="CheckBox" data-duice-bind="user,isAlive" data-duice-option="Y,N"/></td>
		</tr>
	</table>
</div>
</body>
</html>
